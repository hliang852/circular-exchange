name: Daily HKEX Scrape

on:
  schedule:
    # 01:00 HK time = 17:00 UTC (previous day)
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      dates:
        description: "Dates to scrape (space-separated DD/MM/YYYY). Leave blank for yesterday."
        required: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: |
          if [ -n "${{ github.event.inputs.dates }}" ]; then
            python scraper/scrape.py ${{ github.event.inputs.dates }}
          else
            python scraper/scrape.py
          fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/filings.json
          if git diff --cached --quiet; then
            echo "No new filings — nothing to commit."
          else
            git commit -m "chore: daily scrape $(date -u +'%Y-%m-%d')"
            git push
          fi
